name: Build reF1nd
on:
  workflow_dispatch:
  schedule:
    - cron: "00 11 * * *"
  push:
    branches:
      - master
      - hidden
    paths-ignore:
      - "**/README.md"
      - "**/template.json"

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 3
          keep_minimum_runs: 6

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: freebsd, goarch: riscv64 }
          - { goos: freebsd, goarch: amd64 }
          - { goos: freebsd, goarch: 386 }
          - { goos: freebsd, goarch: arm, goarm: 6 }
          - { goos: freebsd, goarch: arm, goarm: 7 }
          - { goos: freebsd, goarch: arm64 }
          - { goos: openbsd, goarch: riscv64 }
          - { goos: openbsd, goarch: amd64 }
          - { goos: openbsd, goarch: 386 }
          - { goos: openbsd, goarch: arm, goarm: 7 }
          - { goos: openbsd, goarch: arm64 }
          - { goos: openbsd, goarch: ppc64 }
          - { goos: windows, goarch: amd64 }
    outputs:
      NEW: ${{ steps.check.outputs.NEW }}
      VERSION: ${{ steps.check.outputs.VERSION }}
    steps:
      - name: Checkout the "hidden" branch
        uses: actions/checkout@v6
        with:
          ref: hidden

      - name: Calculate latest version
        run: |
          LATEST_VERSION=$(curl -sSL https://api.github.com/repos/Sagernet/sing-box/releases/latest | jq -r '.tag_name' | sed 's|v||g')
          if [ "${LATEST_VERSION}" == "null" ]; then
            echo "wrong version"
            exit 1
          fi
          echo "RELEASE_NAME=${LATEST_VERSION}-vincent" >> $GITHUB_ENV
          echo "TAG_NAME=v${LATEST_VERSION}-vincent" >> $GITHUB_ENV
          echo "TAGS=with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_ccm,with_ocm,tfogo_checklinkname0" >> $GITHUB_ENV
          echo "WIN_TAGS=with_gvisor,with_quic,with_dhcp,with_wireguard,with_utls,with_acme,with_clash_api,with_tailscale,with_ccm,with_ocm,with_naive_outbound,with_purego,badlinkname,tfogo_checklinkname0" >> $GITHUB_ENV
          echo "VERSION=${LATEST_VERSION}" >> $GITHUB_ENV
          echo $GITHUB_ENV
        shell: bash

      - name: Check for new version
        id: check
        run: |
          if [ -f last_reF1nd_version ]; then
            LAST_VERSION=$(cat last_reF1nd_version)
          else
            LAST_VERSION="none"
          fi
          echo "Last version: ${LAST_VERSION}, current version: ${{ env.VERSION }}"
          if [ "${{ env.VERSION }}" != "${LAST_VERSION}" ]; then
            echo "${{ env.VERSION }}" > last_reF1nd_version
            echo "NEW=true" >> $GITHUB_ENV
            echo "NEW=true" >> $GITHUB_OUTPUT
          else
            echo "NEW=false" >> $GITHUB_ENV
            echo "NEW=false" >> $GITHUB_OUTPUT
          fi
          echo "VERSION=${{ env.VERSION }}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download and extract source tarball files
        if: github.event_name != 'schedule' || env.NEW == 'true'
        run: |
          wget https://github.com/reF1nd/sing-box/archive/refs/tags/v${{ env.VERSION }}-reF1nd.tar.gz -O sing-box-${{ env.VERSION }}-reF1nd.tar.gz
          tar -xf sing-box-${{ env.VERSION }}-reF1nd.tar.gz && mv sing-box-${{ env.VERSION }}-reF1nd sing-box
          cd sing-box
          SING_TUN_VERSION=$(cat go.mod | grep github.com/sagernet/sing-tun | awk '{ print $2 }' | sed 's|v||g')
          echo -e "\nreplace github.com/sagernet/sing-tun v${SING_TUN_VERSION} => ../sing-tun" >> go.mod
          echo -e "sing-tun version: ${SING_TUN_VERSION}"
          cd ..
          wget https://github.com/Sagernet/sing-tun/archive/refs/tags/v${SING_TUN_VERSION}.tar.gz -O sing-tun-${SING_TUN_VERSION}.tar.gz
          tar -xf sing-tun-${SING_TUN_VERSION}.tar.gz && mv sing-tun-${SING_TUN_VERSION} sing-tun
          ls -lha

      - name: Apply patches
        if: github.event_name != 'schedule' || env.NEW == 'true'
        run: |
          cd sing-box
          patch -p1 < ../sing-box-reF1nd.patch
          cd ../sing-tun
          patch -p1 < ../sing-tun.patch
          cp monitor_darwin.go monitor_freebsd.go
          cp monitor_darwin.go monitor_openbsd.go

      - name: Setup go
        if: github.event_name != 'schedule' || env.NEW == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Cache go dependencies
        if: github.event_name != 'schedule' || env.NEW == 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
          key: go-${{ hashFiles('**/go.sum') }}

      - name: Cache go build (not arm)
        if: matrix.goarch != 'arm' && github.event_name != 'schedule'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
          key: go-${{ hashFiles('**/go.sum') }}-${{ matrix.goos }}-${{ matrix.goarch }}

      - name: Cache go build (arm)
        if: matrix.goarch == 'arm' && github.event_name != 'schedule'
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
          key: go-${{ hashFiles('**/go.sum') }}-${{ matrix.goos }}-${{ matrix.goarch }}-${{ matrix.goarm }}

      - name: Build and compress binary file
        if: github.event_name != 'schedule' || env.NEW == 'true'
        run: |
          cd sing-box
          if [ "${{ matrix.goos }}" == 'windows' ]; then
            go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ env.RELEASE_NAME }}' -s -w -buildid=" -tags ${{ env.WIN_TAGS }} ./cmd/sing-box
          else
            go build -v -trimpath -ldflags "-X 'github.com/sagernet/sing-box/constant.Version=${{ env.RELEASE_NAME }}' -s -w -buildid=" -tags ${{ env.TAGS }} ./cmd/sing-box
          fi
          if [ "${{ matrix.goos }}" == 'windows' ]; then
            mv sing-box.exe bsd-box-reF1nd-${{ matrix.goos }}-${{ matrix.goarch }}.exe
            zip -v bsd-box-reF1nd-${{ matrix.goos }}-${{ matrix.goarch }}.zip bsd-box-reF1nd-${{ matrix.goos }}-${{ matrix.goarch }}.exe
          elif [ "${{ matrix.goarch }}" == 'arm' ]; then
            mv sing-box bsd-box-reF1nd-${{ matrix.goos }}-${{ matrix.goarch }}v${{ matrix.goarm }}
            xz -v bsd-box-reF1nd-${{ matrix.goos }}-${{ matrix.goarch }}v${{ matrix.goarm }}
          else
            mv sing-box bsd-box-reF1nd-${{ matrix.goos }}-${{ matrix.goarch }}
            xz -v bsd-box-reF1nd-${{ matrix.goos }}-${{ matrix.goarch }}
          fi
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0

      - name: Move file to publish directory
        if: github.event_name != 'schedule' || env.NEW == 'true'
        run: |
          mkdir -p publish
          cp -v sing-box/bsd-box-* publish/

      - name: Release and upload assets
        if: github.event_name != 'schedule' || env.NEW == 'true'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          draft: false
          prerelease: false
          files: |
            ./publish/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push:
    runs-on: ubuntu-latest
    if: needs.build.outputs.NEW == 'true'
    needs:
      - build
    steps:
      - name: Checkout the "hidden" branch
        uses: actions/checkout@v6
        with:
          ref: hidden

      - name: Update last_reF1nd_version
        run: |
          echo "${{ needs.build.outputs.VERSION }}" > last_reF1nd_version

      - name: Push last_reF1nd_version to "hidden" branch
        run: |
          git config --local user.name "Vincent Loeng"
          git config --local user.email "173226116+Vincent-Loeng@users.noreply.github.com"
          git add last_reF1nd_version
          git commit -m "Release ${{ needs.build.outputs.VERSION }} (reF1nd)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
